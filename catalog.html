<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товарів | JVCRPT</title>
    <link rel="stylesheet" href="catalog.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <img src="logoJVCRPT.svg" alt="JVCRPT Logo" class="header-top-logo">

                <nav class="nav">
                    <a href="/index.html#" class="nav-link">
                        <img src="homepage.png" alt="">Головна сторінка
                    </a>
                    <a href="/catalog.html#" class="nav-link">
                        <img src="pics/catalog.png" alt="">Каталог
                    </a>
                    <button id="cart-icon-btn" class="cart-icon-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <main class="catalogPage">
        <div class="container">
            <h1 class="catalog-title">Каталог товарів</h1>
            <p class="catalog-description">Обирайте з нашої широкої колекції якісних товарів</p>

            <div class="filters">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="category">Категорія</label>
                        <select id="category" class="filter-select">
                            <option value="all">Всі категорії</option>
                            <option value="laptops">Ноутбуки</option>
                            <option value="phones">Телефони</option>
                            <option value="watches">Годинники</option>
                            <option value="headphones">Навушники</option>
                            <option value="pc">ПК</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="price">Ціна</label>
                        <select id="price" class="filter-select">
                            <option value="all">Всі ціни</option>
                            <option value="0-5000">до 5000 грн</option>
                            <option value="5000-15000">5000 - 15000 грн</option>
                            <option value="15000-30000">15000 - 30000 грн</option>
                            <option value="30000+">понад 30000 грн</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="sort">Сортування</label>
                        <select id="sort" class="filter-select">
                            <option value="popular">За популярністю</option>
                            <option value="price-asc">Від дешевих до дорогих</option>
                            <option value="price-desc">Від дорогих до дешевих</option>
                            <option value="new">Новинки</option>
                        </select>
                    </div>

                    <button class="filter-button">Застосувати</button>
                </div>
            </div>

            <div class="products-grid"></div>

            <div class="pagination"></div>
        </div>
    </main>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Ваш кошик</h2>
                <button id="close-cart" class="close-cart">&times;</button>
            </div>
            
            <div id="cart-items-container" class="cart-items-container">
                <p class="empty-cart-text">Кошик порожній</p>
            </div>
            
            <div class="cart-footer">
                <div class="total-price-block">
                    <span>Разом:</span>
                    <span id="total-price-sum">0 грн</span>
                </div>
                <button class="order-button">Оформити замовлення</button>
            </div>
        </div>
    </div>

    <script src="catalog.js"></script>
</body>
</html>
